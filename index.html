<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Signage – Osman Gazi Moschee Ulm</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: { accent: '#009972', accentDark: '#007a5b' },
        fontFamily: { sans: ['"Open Sans"', 'sans-serif'] },
      }
    }
  }
</script>
<style>
  :root { --accent:#009972; }
  body { 
    margin:0; padding:0; height:100vh; 
    background:#e7eae9; 
    display: flex; align-items: center; justify-content: center;
    overflow:hidden; font-family:"Open Sans",sans-serif; 
  }
  
  .tnum { font-variant-numeric: tabular-nums; }

  #stage {
    position: relative;
    width: 1920px; height: 1080px;
    background: #ffffff;
    overflow: hidden;
    box-shadow: 0 40px 120px rgba(0,0,0,.35);
    flex-shrink: 0;
  }

  .pattern { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:0; }
  .card { background:#ffffff; border-radius:24px; box-shadow:0 8px 30px rgba(15,40,32,.06); }

  /* Intelligentes Ticker-Verhalten */
  @keyframes ticker { 0% { transform:translateX(0); } 100% { transform:translateX(-100%); } }
  .ticker-animate { display:inline-block; padding-left:100%; animation:ticker 45s linear infinite; }

  .slide { position:absolute; inset:0; opacity:0; transition:opacity 1.2s ease-in-out; background-size:contain; background-repeat:no-repeat; background-position:center; background-color:#ffffff; }
  .slide.active { opacity:1; }

  .pulse { animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1; transform:scale(1);} 50% { opacity:.35; transform:scale(.85);} }
</style>
</head>
<body>

<div id="stage">
  <svg class="pattern" xmlns="http://www.w3.org/2000/svg">
    <defs><pattern id="geo" width="110" height="110" patternUnits="userSpaceOnUse"><g fill="none" stroke="#009972" stroke-width="1.1" opacity="0.05"><path d="M55 10 L100 55 L55 100 L10 55 Z"/><path d="M25 25 L85 25 L85 85 L25 85 Z"/></g></pattern></defs>
    <rect width="100%" height="100%" fill="url(#geo)"/>
  </svg>

  <div class="relative z-10 h-full w-full grid p-10 gap-7" style="grid-template-columns: 500px 450px 1fr; grid-template-rows: 140px minmax(0,1fr) 88px;">

    <header class="card col-span-3 flex items-center justify-between px-12">
      <div class="flex items-center gap-4 w-[420px]">
        <div class="flex items-center justify-center w-14 h-14 rounded-2xl overflow-hidden shrink-0">
          <img src="logo2.png" alt="Logo" class="w-full h-full object-contain bg-white">
        </div>
        <div>
          <div class="text-[34px] font-extrabold leading-none text-black">Ulm</div>
          <div class="text-[15px] font-medium text-gray-500 tracking-[.25em] uppercase mt-1">Osman Gazi Moschee</div>
        </div>
      </div>
      <div class="flex flex-col items-center">
        <div id="clock" class="tnum text-[78px] font-extrabold text-black">00:00:00</div>
        <div class="text-[14px] font-semibold tracking-[.35em] uppercase text-accent mt-1">Aktuelle Uhrzeit</div>
      </div>
      <div class="flex items-stretch gap-7 w-[420px] justify-end">
        <div class="text-right"><div class="text-[13px] font-bold text-gray-400 uppercase">Gregorianisch</div><div id="g-date" class="text-[20px] font-bold text-black">–</div></div>
        <div class="w-px bg-gray-200"></div>
        <div class="text-right"><div class="text-[13px] font-bold text-accent uppercase">Hicri</div><div id="h-date" class="text-[20px] font-bold text-black">–</div></div>
      </div>
    </header>

    <section class="flex flex-col gap-5 min-h-0">
      <div class="card flex-1 flex flex-col px-8 py-7 overflow-hidden">
        <div class="flex items-center justify-between mb-5">
          <h2 class="text-[26px] font-extrabold text-black">Namaz Vakitleri</h2>
          <span class="text-[14px] font-semibold text-gray-400" id="g-date-short">Wird geladen...</span>
        </div>
        <div id="prayer-list" class="flex flex-col justify-between flex-1 min-h-0">
           </div>
      </div>
      <div class="card bg-accent px-7 py-5 flex items-center justify-between text-white" style="background:linear-gradient(135deg,#009972,#007a5b);">
        <div class="flex items-center gap-4">
          <div class="p-2 bg-white/20 rounded-lg"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg></div>
          <div><div class="text-[22px] font-extrabold">Morgengebet</div><div class="text-[13px] uppercase">Sabah</div></div>
        </div>
        <div id="sabah-time-highlight" class="tnum text-[34px] font-extrabold">--:--</div>
      </div>
    </section>

    <section>
      <div class="card h-full flex flex-col items-center justify-center text-center p-8 text-white relative overflow-hidden" style="background:linear-gradient(180deg,#00a47a,#007a5b);">
        <div class="relative z-10">
          <div class="flex items-center justify-center gap-3 mb-6">
            <span class="w-3 h-3 rounded-full bg-white pulse"></span>
            <span class="text-[18px] font-bold tracking-[.3em] uppercase opacity-80">Sıradaki / Nächstes</span>
          </div>
          <div id="next-name-tr" class="text-[64px] font-extrabold uppercase">--</div>
          <div id="next-name-de" class="text-[28px] font-medium opacity-70 italic">--</div>
          <div class="w-20 h-1 bg-white/30 mx-auto my-8"></div>
          <div class="text-[18px] font-bold tracking-[.3em] uppercase opacity-70 mb-4">Kalan Süre</div>
          <div id="countdown" class="tnum text-[90px] font-extrabold tracking-tighter">00:00:00</div>
          <div class="mt-12 py-4 px-6 bg-black/10 rounded-2xl inline-block text-[24px] font-semibold">
            Vakit: <span id="next-time" class="tnum">00:00</span>
          </div>
        </div>
      </div>
    </section>

    <section class="card relative flex flex-col overflow-hidden bg-white">
      <div id="slideshow" class="absolute inset-0 bottom-14"></div>
      
      <div class="absolute inset-x-0 bottom-0 h-14 flex justify-center items-center z-20 bg-gray-50 border-t border-gray-100">
        <div id="dots" class="flex gap-4"></div>
      </div>
    </section>

    <footer class="col-span-3 flex gap-7">
      <div class="card flex-1 flex items-center overflow-hidden px-0">
        <div class="flex items-center h-full px-8 text-white font-bold text-[20px] uppercase shrink-0" style="background:var(--accent);">Ankündigungen</div>
        <div id="ticker-container" class="overflow-hidden flex-1 h-full flex items-center">
          <div id="ticker-text" class="text-[28px] font-semibold whitespace-nowrap px-6">Wird geladen...</div>
        </div>
      </div>
      <div class="card flex items-center justify-center p-4 bg-white" style="width:450px;">
        <img src="logo.png" alt="Logo" class="h-full w-auto object-contain">
      </div>
    </footer>
  </div>
</div>

<script src="script.js?v=5"></script>
</body>
</html>
